<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Box Shadow Generator - CSS Box Shadow Tool</title>
<meta name="description" content="Generate beautiful CSS box-shadow effects with multiple layers, presets, and real-time preview.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--sf:#16213e;--sf2:#0f3460;--ac:#e94560;--ac2:#533483;--tx:#eee;--tx2:#aaa;--r:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.5}
.wrap{max-width:1400px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0 20px}
header h1{font-size:2rem;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--tx2);margin-top:6px;font-size:.95rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px}
.card{background:var(--sf);border-radius:var(--r);padding:24px;border:1px solid rgba(255,255,255,.06)}
.card h2{font-size:1.1rem;font-weight:600;margin-bottom:16px}
.prev-area{display:flex;align-items:center;justify-content:center;min-height:350px;background:var(--bg);border-radius:var(--r)}
.prev-box{width:200px;height:200px;background:var(--sf2);border-radius:16px;transition:box-shadow .15s}
.presets{display:flex;flex-wrap:wrap;gap:8px}
.pbtn{padding:8px 16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--tx);border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s}
.pbtn:hover{background:var(--ac);border-color:var(--ac)}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:500;transition:all .2s}
.btn-p{background:var(--ac);color:#fff}
.btn-p:hover{opacity:.85}
.btn-d{background:rgba(233,69,96,.15);color:var(--ac);border:1px solid rgba(233,69,96,.3)}
.btn-d:hover{background:var(--ac);color:#fff}
.lcard{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px;margin-bottom:10px}
.lhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.lhead span{font-weight:500;font-size:.9rem}
.crow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.cg{display:flex;flex-direction:column;gap:4px}
.cg label{font-size:.78rem;color:var(--tx2);display:flex;justify-content:space-between}
.cg label span{color:var(--ac);font-weight:500}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.1);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--ac);cursor:pointer}
.cir{display:flex;gap:12px;align-items:center;margin-top:4px}
.cir input[type=color]{width:40px;height:32px;border:none;border-radius:6px;cursor:pointer;background:transparent}
.cir label{font-size:.82rem;color:var(--tx2);display:flex;align-items:center;gap:6px;cursor:pointer}
.cir input[type=checkbox]{accent-color:var(--ac)}
.codebox{background:rgba(0,0,0,.3);border-radius:10px;padding:16px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.88rem;color:#7ec8e3;position:relative;white-space:pre-wrap;word-break:break-all;min-height:60px;border:1px solid rgba(255,255,255,.06)}
.cpbtn{position:absolute;top:10px;right:10px;padding:6px 14px;background:var(--ac);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem}
.cpbtn.ok{background:#27ae60}
.lscroll{max-height:520px;overflow-y:auto;padding-right:4px}
.lscroll::-webkit-scrollbar{width:4px}
.lscroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.bctrls{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.bctrls label{font-size:.82rem;color:var(--tx2);display:flex;align-items:center;gap:6px}
.bctrls input[type=color]{width:36px;height:28px;border:none;border-radius:6px;cursor:pointer;background:transparent}
.bctrls input[type=range]{width:100px}
footer{text-align:center;padding:30px 0 10px;color:var(--tx2);font-size:.8rem}
@media(max-width:900px){.grid{grid-template-columns:1fr}.crow{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>CSS Box Shadow Generator</h1>
<p>Create beautiful multi-layer box shadows with real-time preview</p>
</header>
<div class="card" style="margin-bottom:20px">
<h2>Presets</h2>
<div class="presets" id="presets"></div>
</div>
<div class="grid">
<div>
<div class="card">
<h2>Preview</h2>
<div class="bctrls">
<label>BG <input type="color" id="bgC" value="#1a1a2e"></label>
<label>Box <input type="color" id="boxC" value="#0f3460"></label>
<label>Size <input type="range" id="boxS" min="80" max="300" value="200"><span id="boxSV">200</span>px</label>
<label>Radius <input type="range" id="boxR" min="0" max="100" value="16"><span id="boxRV">16</span>px</label>
</div>
<div class="prev-area" id="pArea">
<div class="prev-box" id="pBox"></div>
</div>
</div>
<div class="card" style="margin-top:24px">
<h2>Generated CSS</h2>
<div class="codebox"><button class="cpbtn" onclick="copyCSS()">Copy</button><code id="codeOut"></code></div>
</div>
</div>
<div>
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<h2 style="margin-bottom:0">Shadow Layers</h2>
<button class="btn btn-p" onclick="addLayer()">+ Add Layer</button>
</div>
<div class="lscroll" id="layers"></div>
</div>
</div>
</div>
<footer>CSS Box Shadow Generator &mdash; Free Online Tool</footer>
</div>
<script>
let layers=[{x:4,y:4,blur:15,spread:0,color:'#00000040',inset:false}];
const PRESETS={
'Material Design':[{x:0,y:2,blur:4,spread:-1,color:'#0003',inset:false},{x:0,y:4,blur:5,spread:0,color:'#00000024',inset:false},{x:0,y:1,blur:10,spread:0,color:'#0000001f',inset:false}],
'Neumorphism':[{x:8,y:8,blur:16,spread:0,color:'#0d0d1f',inset:false},{x:-8,y:-8,blur:16,spread:0,color:'#272750',inset:false}],
'Glassmorphism':[{x:0,y:8,blur:32,spread:0,color:'#00000037',inset:false},{x:0,y:0,blur:1,spread:0,color:'#ffffff15',inset:true}],
'Soft Shadow':[{x:0,y:10,blur:40,spread:-10,color:'#00000050',inset:false}],
'Hard Shadow':[{x:8,y:8,blur:0,spread:0,color:'#e9456080',inset:false}],
'Layered':[{x:0,y:1,blur:2,spread:0,color:'#0000001a',inset:false},{x:0,y:2,blur:4,spread:0,color:'#0000001a',inset:false},{x:0,y:5,blur:10,spread:0,color:'#0000001a',inset:false},{x:0,y:10,blur:20,spread:0,color:'#0000001a',inset:false},{x:0,y:20,blur:40,spread:0,color:'#0000001a',inset:false}],
'Neon Glow':[{x:0,y:0,blur:20,spread:2,color:'#e9456080',inset:false},{x:0,y:0,blur:60,spread:10,color:'#53348340',inset:false}],
'Deep':[{x:0,y:25,blur:50,spread:-12,color:'#000000b0',inset:false}]
};
function init(){
const pC=document.getElementById('presets');
Object.keys(PRESETS).forEach(n=>{const b=document.createElement('button');b.className='pbtn';b.textContent=n;b.onclick=()=>{layers=PRESETS[n].map(l=>({...l}));render();};pC.appendChild(b);});
['bgC','boxC'].forEach(id=>document.getElementById(id).addEventListener('input',updatePreview));
['boxS','boxR'].forEach(id=>document.getElementById(id).addEventListener('input',function(){document.getElementById(id==='boxS'?'boxSV':'boxRV').textContent=this.value;updatePreview();}));
render();
}
function render(){renderLayers();updatePreview();updateCode();}
function renderLayers(){
const c=document.getElementById('layers');c.innerHTML='';
layers.forEach((l,i)=>{
const d=document.createElement('div');d.className='lcard';
d.innerHTML=`<div class="lhead"><span>Layer ${i+1}</span><button class="btn btn-d" onclick="removeLayer(${i})">&times; Remove</button></div>
<div class="crow"><div class="cg"><label>X Offset <span>${l.x}px</span></label><input type="range" min="-100" max="100" value="${l.x}" oninput="upd(${i},'x',this)"></div>
<div class="cg"><label>Y Offset <span>${l.y}px</span></label><input type="range" min="-100" max="100" value="${l.y}" oninput="upd(${i},'y',this)"></div></div>
<div class="crow"><div class="cg"><label>Blur <span>${l.blur}px</span></label><input type="range" min="0" max="150" value="${l.blur}" oninput="upd(${i},'blur',this)"></div>
<div class="cg"><label>Spread <span>${l.spread}px</span></label><input type="range" min="-50" max="50" value="${l.spread}" oninput="upd(${i},'spread',this)"></div></div>
<div class="cir"><input type="color" value="${l.color.slice(0,7)}" oninput="updColor(${i},this)"><label><input type="checkbox" ${l.inset?'checked':''} onchange="updInset(${i},this)"> Inset</label></div>`;
c.appendChild(d);
});
}
function upd(i,k,el){layers[i][k]=+el.value;el.parentElement.querySelector('span').textContent=el.value+'px';updatePreview();updateCode();}
function updColor(i,el){layers[i].color=el.value+'40';updatePreview();updateCode();}
function updInset(i,el){layers[i].inset=el.checked;updatePreview();updateCode();}
function addLayer(){layers.push({x:4,y:4,blur:15,spread:0,color:'#00000040',inset:false});render();}
function removeLayer(i){if(layers.length>1){layers.splice(i,1);render();}}
function getShadow(){return layers.map(l=>`${l.inset?'inset ':''}${l.x}px ${l.y}px ${l.blur}px ${l.spread}px ${l.color}`).join(',\n    ');}
function updatePreview(){
const box=document.getElementById('pBox');const area=document.getElementById('pArea');
box.style.boxShadow=layers.map(l=>`${l.inset?'inset ':''}${l.x}px ${l.y}px ${l.blur}px ${l.spread}px ${l.color}`).join(', ');
area.style.background=document.getElementById('bgC').value;
box.style.background=document.getElementById('boxC').value;
const s=document.getElementById('boxS').value;box.style.width=box.style.height=s+'px';
box.style.borderRadius=document.getElementById('boxR').value+'px';
}
function updateCode(){document.getElementById('codeOut').textContent=`box-shadow:\n    ${getShadow()};`;}
function copyCSS(){
const t=`box-shadow: ${getShadow()};`;
navigator.clipboard.writeText(t).then(()=>{const b=document.querySelector('.cpbtn');b.textContent='Copied!';b.classList.add('ok');setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok');},1500);});
}
init();
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130747" async data-cfasync="false"></script>
</body>
</html>
